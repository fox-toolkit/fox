name: tests
on:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test Fox
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go: [ '>=1.26' ]
    steps:
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}
          cache: false

      - name: Check out code
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Run tests
        run: go test -v -coverprofile=coverage.txt -covermode=atomic ./...

      - name: Run data races tests
        run: go test -v -race -run "TestRouter_Race_Data|TestRouter_Race_HostnamePathSwitch" -count=10 ./...

      - name: Fuzz smoke
        run: |
          for t in Fuzz_parseBraceSegment FuzzRouter_Add FuzzRouter_AddDelete; do
            echo "::group::${t}"
            go test -run '^$' -fuzz="^${t}$" -fuzztime=20s .
            echo "::endgroup::"
          done

      - name: Upload fuzz crashers on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-crashers
          path: testdata/fuzz/
          if-no-files-found: ignore

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          fail_ci_if_error: true
          files: ./coverage.txt
          token: ${{ secrets.CODECOV_TOKEN }}
  lint:
    name: Lint Fox
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go: [ '>=1.26' ]
    steps:
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}
          cache: false

      - name: Check out code
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Run linter
        uses: golangci/golangci-lint-action@v9
